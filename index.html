<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--
    Performance: tell the browser this page uses WebGL so it can
    pre-allocate GPU resources before the loader even runs.
  -->
  <meta http-equiv="origin-trial" content="">

  <title>BULLET HOLE</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    /* ── Remove all default margin/scroll so canvas fills the window ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      /* GPU hint — compositing layer for the whole page */
      will-change: transform;
    }

    #unity-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #unity-canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      /* Force hardware-accelerated compositing */
      transform: translateZ(0);
      will-change: contents;
      /* Prevent blurry scaling on high-DPI screens */
      image-rendering: pixelated;
    }

    /* Loading bar — centred overlay */
    #unity-loading-bar {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      text-align: center;
      z-index: 10;
    }
    #unity-logo { width: 154px; height: 130px; background: url('TemplateData/unity-logo-dark.png') no-repeat center; }
    #unity-progress-bar-empty {
      width: 300px; height: 18px;
      margin-top: 14px;
      background: #1a1a1a;
      border-radius: 9px;
      overflow: hidden;
      border: 1px solid #444;
    }
    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #e74c3c, #ff6b6b);
      border-radius: 9px;
      transition: width 0.1s ease;
    }

    #unity-warning {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }

    /* Footer — hidden once loaded */
    #unity-footer { display: none; }


  </style>
</head>
<body>

<div id="unity-container">
  <canvas id="unity-canvas" tabindex="-1"></canvas>

  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>

  <div id="unity-warning"></div>
</div>

<script>
"use strict";

// ════════════════════════════════════════════════════════════════════════════
//  PERFORMANCE — preload all build files in parallel so the browser
//  has them cached before Unity's loader even asks for them.
//  This cuts load time significantly on repeat visits.
// ════════════════════════════════════════════════════════════════════════════
var buildUrl   = "Build";
var loaderUrl  = buildUrl + "/joj.loader.js";
var BUILD_FILES = [
  buildUrl + "/joj.data.unityweb",
  buildUrl + "/joj.framework.js.unityweb",
  buildUrl + "/joj.wasm.unityweb",
];

// Fire-and-forget prefetch — tells the browser to download and cache
// these files immediately without blocking anything.
BUILD_FILES.forEach(function(url) {
  var link = document.createElement("link");
  link.rel  = "prefetch";
  link.href = url;
  link.as   = "fetch";
  link.crossOrigin = "anonymous";
  document.head.appendChild(link);
});


// ════════════════════════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUT HANDLING
//
//  RULE: preventDefault() stops the BROWSER action (print dialog etc.)
//  but the event still propagates to Unity — so Ctrl+Space, Ctrl+Shift
//  etc. ALL work normally for gameplay. No stopPropagation ever used.
//
//  ESCAPE: hold 600ms = exit fullscreen. Tap = Unity gets it as normal.
// ════════════════════════════════════════════════════════════════════════════
var BROWSER_ONLY = [
  { key: ' ',  ctrl: true  },  // Ctrl+Space  → no IME popup
  { key: 'p',  ctrl: true  },  // Ctrl+P      → no print dialog
  { key: 's',  ctrl: true  },  // Ctrl+S      → no save dialog
  { key: 'u',  ctrl: true  },  // Ctrl+U      → no view-source
  { key: 'd',  ctrl: true  },  // Ctrl+D      → no bookmark
  { key: 'f',  ctrl: true  },  // Ctrl+F      → no find bar
  { key: 'g',  ctrl: true  },  // Ctrl+G      → no find next
  { key: 'F1', ctrl: false },  // F1          → no browser help
  { key: 'F3', ctrl: false },  // F3          → no find
  { key: 'F5', ctrl: false },  // F5          → no reload
  { key: 'F7', ctrl: false },  // F7          → no caret browsing
];

document.addEventListener('keydown', function(e) {
  for (var i = 0; i < BROWSER_ONLY.length; i++) {
    var b = BROWSER_ONLY[i];
    var ctrlMatch = b.ctrl ? (e.ctrlKey || e.metaKey) : (!e.ctrlKey && !e.metaKey);
    if (ctrlMatch && e.key === b.key) {
      e.preventDefault();
      // NO stopPropagation — Unity canvas must still receive this event
      return;
    }
  }
}, true);

// ── Hold Escape 600ms to exit fullscreen ─────────────────────────────────
// Tap Escape = Unity gets it untouched (pause menu etc.)
var escTimer = null;
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && !escTimer) {
    escTimer = setTimeout(function() {
      if (document.fullscreenElement) document.exitFullscreen();
      escTimer = null;
    }, 600);
  }
}, true);
document.addEventListener('keyup', function(e) {
  if (e.key === 'Escape') { clearTimeout(escTimer); escTimer = null; }
}, true);


// ════════════════════════════════════════════════════════════════════════════
//  LOCAL SAVE — persist Unity's IndexedDB/PlayerPrefs across sessions.
//  config.autoSyncPersistentDataPath = true handles the Unity side;
//  this JS listener ensures a final sync when the tab closes.
// ════════════════════════════════════════════════════════════════════════════
var unityInstance = null;

window.addEventListener('beforeunload', function() {
  // Ask the browser to sync the IDBFS (Unity's persistent data) before close.
  // Only works if Unity has exposed FS.syncfs — safe to call speculatively.
  try {
    if (typeof FS !== 'undefined' && typeof FS.syncfs === 'function') {
      FS.syncfs(false, function() {});
    }
  } catch(e) {}
});


// ════════════════════════════════════════════════════════════════════════════
//  DREAMLO LEADERBOARD BRIDGE
//
//  Your Unity C# script calls http://dreamlo.com/lb/... internally.
//  That is routed through your personal Cloudflare Worker at
//  https://dreamlo.2010-rsinks.workers.dev which adds HTTPS + CORS headers.
//
//  This JS layer provides a global dreamloBridge object so that if you ever
//  want to call Dreamlo from the page (e.g. for an HTML overlay scoreboard),
//  you can use dreamloBridge.get() / dreamloBridge.add() directly.
//  Unity's internal UnityWebRequest already works via the C# script change.
// ════════════════════════════════════════════════════════════════════════════
var DREAMLO_WORKER = "https://dreamlo.2010-rsinks.workers.dev/lb/";
var PUBLIC_CODE    = "69ca88d28f40bc2f60b113e6";

window.dreamloBridge = {
  // Fetch top scores — callback(err, entries[])
  // entries = [{ name, score, date }, ...]
  getScores: function(count, callback) {
    var url = DREAMLO_WORKER + PUBLIC_CODE + "/pipe/" + (count || 25);
    fetch(url)
      .then(function(r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(function(raw) {
        var entries = [];
        raw.trim().split("\n").forEach(function(line, i) {
          var p = line.trim().split("|");
          if (p.length >= 2) {
            entries.push({
              rank:  i + 1,
              name:  decodeURIComponent(p[0] || "???"),
              score: parseInt(p[1], 10) || 0,
              date:  p[4] || ""
            });
          }
        });
        callback(null, entries);
      })
      .catch(function(err) {
        console.error("[Dreamlo] getScores error:", err);
        callback(err, []);
      });
  },

  // Quick debug helper — logs top 10 to console
  logScores: function() {
    this.getScores(10, function(err, entries) {
      if (err) { console.error("[Dreamlo] Error:", err); return; }
      console.table(entries);
    });
  }
};


// ════════════════════════════════════════════════════════════════════════════
//  BANNER / ERROR DISPLAY
// ════════════════════════════════════════════════════════════════════════════
function unityShowBanner(msg, type) {
  var warningBanner = document.querySelector("#unity-warning");
  function updateVisibility() {
    warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
  }
  var div = document.createElement('div');
  div.innerHTML = msg;
  warningBanner.appendChild(div);
  if (type === 'error') {
    div.style.cssText = 'background:#c0392b;color:#fff;padding:10px;font-family:monospace';
  } else {
    if (type === 'warning')
      div.style.cssText = 'background:#f39c12;color:#000;padding:10px';
    setTimeout(function() {
      if (warningBanner.contains(div)) warningBanner.removeChild(div);
      updateVisibility();
    }, 5000);
  }
  updateVisibility();
}


// ════════════════════════════════════════════════════════════════════════════
//  UNITY CONFIG
// ════════════════════════════════════════════════════════════════════════════
var config = {
  arguments:          [],
  dataUrl:            buildUrl + "/joj.data.unityweb",
  frameworkUrl:       buildUrl + "/joj.framework.js.unityweb",
  codeUrl:            buildUrl + "/joj.wasm.unityweb",
  streamingAssetsUrl: "StreamingAssets",
  companyName:        "Place Holder Name",
  productName:        "BULLET HOLE",
  productVersion:     "0.1",
  showBanner:         unityShowBanner,

  // ── PERFORMANCE FLAGS ──────────────────────────────────────────────
  // Keep WebGL canvas resolution matched to CSS size (best for full-window)
  matchWebGLToCanvasSize: true,

  // Sync Unity's persistent data to IndexedDB automatically so saves
  // survive page reloads without any extra C# code.
  autoSyncPersistentDataPath: true,
};


// ════════════════════════════════════════════════════════════════════════════
//  FULLSCREEN HANDLING
// ════════════════════════════════════════════════════════════════════════════
function goFullscreen() {
  var el = document.documentElement;
  var req = el.requestFullscreen
         || el.webkitRequestFullscreen
         || el.mozRequestFullScreen
         || el.msRequestFullscreen;
  if (req) req.call(el);
}

// Auto fullscreen on first click anywhere (browser requires user gesture)
var _fsOnce = false;
document.addEventListener('click', function() {
  if (_fsOnce) return;
  _fsOnce = true;
  goFullscreen();
  document.getElementById("unity-canvas").focus();
}, { once: true });

// No auto re-enter — hold Escape to exit is intentional.


// ════════════════════════════════════════════════════════════════════════════
//  LOAD UNITY
// ════════════════════════════════════════════════════════════════════════════
document.querySelector("#unity-loading-bar").style.display = "block";

var script = document.createElement("script");
script.src = loaderUrl;

// ── PERFORMANCE: load the script without blocking the parser ──
script.async = true;

script.onload = function() {
  createUnityInstance(
    document.querySelector("#unity-canvas"),
    config,
    function(progress) {
      document.querySelector("#unity-progress-bar-full").style.width =
        (100 * progress) + "%";
    }
  ).then(function(instance) {
    unityInstance = instance;
    document.querySelector("#unity-loading-bar").style.display = "none";

    window.unityInstance = instance;

    console.log("[BULLET HOLE] Unity loaded. Dreamlo worker: " + DREAMLO_WORKER);
    console.log("[BULLET HOLE] Run dreamloBridge.logScores() to inspect leaderboard.");

  }).catch(function(message) {
    // Show error in banner instead of a jarring alert()
    unityShowBanner(message, 'error');
    console.error("[BULLET HOLE] Unity load failed:", message);
  });
};

script.onerror = function() {
  unityShowBanner(
    "Failed to load game files. Please check your connection and refresh.",
    'error'
  );
};

document.body.appendChild(script);
</script>
</body>
</html>
