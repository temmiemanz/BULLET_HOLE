<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | My project (1)</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
</head>
<body>
<div id="unity-container" class="unity-desktop">
  <canvas id="unity-canvas" width=960 height=540 tabindex="-1"></canvas>
  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
  <div id="unity-warning"></div>
  <div id="unity-footer">
    <div id="unity-logo-title-footer"></div>
    <div id="unity-fullscreen-button"></div>
    <div id="unity-build-title">My project (1)</div>
  </div>
</div>

<script>

// ============================================================
// BLOCK KEYBOARD SHORTCUTS
// Blocks Ctrl+Space (and others if uncommented).
// Uses stopImmediatePropagation in capture phase so it fires
// before the browser's own handlers ever see the keystroke.
// ============================================================
var BLOCKED_KEYS = [
  { key: ' ',  ctrl: true  },   // Ctrl+Space  ← BLOCKED
  // { key: 'w',  ctrl: true  }, // Ctrl+W  (close tab)
  // { key: 'r',  ctrl: true  }, // Ctrl+R  (reload)
  // { key: 's',  ctrl: true  }, // Ctrl+S  (save page)
  // { key: 'F5', ctrl: false }, // F5      (reload)
];

function blockKey(e) {
  for (var i = 0; i < BLOCKED_KEYS.length; i++) {
    var b = BLOCKED_KEYS[i];
    var ctrlOk = b.ctrl ? (e.ctrlKey || e.metaKey) : true;
    if (ctrlOk && e.key === b.key) {
      e.preventDefault();
      e.stopImmediatePropagation(); // stronger than stopPropagation
      return false;
    }
  }
}

// Attach to BOTH document and window in capture phase (true = capture)
// This intercepts the event BEFORE any other listener including the browser
document.addEventListener('keydown', blockKey, true);
window.addEventListener('keydown', blockKey, true);

// Also attach directly to the canvas once DOM is ready
document.addEventListener('DOMContentLoaded', function() {
  var c = document.getElementById('unity-canvas');
  if (c) c.addEventListener('keydown', blockKey, true);
});


// ============================================================
// DREAMLO — READ THIS BEFORE TOUCHING ANYTHING
//
// WHY IT DOESN'T WORK ON GITHUB PAGES:
//   GitHub Pages is served over HTTPS.
//   Free Dreamlo leaderboards are HTTP only.
//   Browsers hard-block HTTP requests from HTTPS pages
//   (called "mixed content"). No amount of HTML can override this.
//
// THE TWO REAL FIXES:
//
//   FIX 1 — Donate $5 on dreamlo.com
//     This upgrades YOUR leaderboard to HTTPS.
//     After that, your Unity C# code works with zero HTML changes.
//     This is the correct permanent solution.
//
//   FIX 2 — Use the proxy function below (free, JS-side only)
//     If you're calling Dreamlo from JavaScript on this page,
//     use dreamloGet() below — it routes the HTTP dreamlo request
//     through the free HTTPS proxy at allorigins.win.
//
//     ⚠ This ONLY works for JS calls on this page.
//        If Unity's C# code makes the request internally, this
//        proxy does NOT help — only Fix 1 works for that.
//
// HOW TO USE dreamloGet():
//   dreamloGet("YOUR_PUBLIC_CODE", "json", function(err, data) {
//     if (!err) console.log("Scores:", data);
//   });
// ============================================================
function dreamloGet(publicCode, format, callback) {
  var dreamloUrl = "http://dreamlo.com/lb/" + publicCode + "/" + (format || "json");
  var proxyUrl   = "https://api.allorigins.win/get?url=" + encodeURIComponent(dreamloUrl);
  fetch(proxyUrl)
    .then(function(r) { return r.json(); })
    .then(function(wrapper) {
      // allorigins wraps response: { contents: "...", status: {...} }
      var parsed = JSON.parse(wrapper.contents);
      callback(null, parsed);
    })
    .catch(function(err) {
      console.error("Dreamlo proxy error:", err);
      callback(err, null);
    });
}

// ↓ Uncomment and replace YOUR_PUBLIC_CODE to test
// dreamloGet("YOUR_PUBLIC_CODE", "json", function(err, data) {
//   if (!err) console.log("Leaderboard data:", data);
// });


// ============================================================
// UNITY LOADER — unchanged from your original
// ============================================================
var canvas = document.querySelector("#unity-canvas");

function unityShowBanner(msg, type) {
  var warningBanner = document.querySelector("#unity-warning");
  function updateBannerVisibility() {
    warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
  }
  var div = document.createElement('div');
  div.innerHTML = msg;
  warningBanner.appendChild(div);
  if (type == 'error') {
    div.style = 'background: red; padding: 10px;';
  } else {
    if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
    setTimeout(function() {
      warningBanner.removeChild(div);
      updateBannerVisibility();
    }, 5000);
  }
  updateBannerVisibility();
}

var buildUrl = "Build";
var loaderUrl = buildUrl + "/Builds.loader.js";
var config = {
  arguments: [],
  dataUrl:            buildUrl + "/Builds.data.unityweb",
  frameworkUrl:       buildUrl + "/Builds.framework.js.unityweb",
  codeUrl:            buildUrl + "/Builds.wasm.unityweb",
  streamingAssetsUrl: "StreamingAssets",
  companyName:        "DefaultCompany",
  productName:        "My project (1)",
  productVersion:     "0.1",
  showBanner:         unityShowBanner,
};

if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
  var meta = document.createElement('meta');
  meta.name = 'viewport';
  meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
  document.getElementsByTagName('head')[0].appendChild(meta);
  document.querySelector("#unity-container").className = "unity-mobile";
  canvas.className = "unity-mobile";
} else {
  canvas.style.width  = "960px";
  canvas.style.height = "540px";
}

document.querySelector("#unity-loading-bar").style.display = "block";

var script = document.createElement("script");
script.src = loaderUrl;
script.onload = () => {
  createUnityInstance(canvas, config, (progress) => {
    document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
  }).then((unityInstance) => {
    document.querySelector("#unity-loading-bar").style.display = "none";
    document.querySelector("#unity-fullscreen-button").onclick = () => {
      unityInstance.SetFullscreen(1);
    };
  }).catch((message) => {
    alert(message);
  });
};

document.body.appendChild(script);

</script>
</body>
</html>
