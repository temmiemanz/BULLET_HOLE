<!DOCTYPE html><html lang="en-us"> <head> <meta charset="utf-8"> <meta http-equiv="Content-Type" content="text/html; charset=utf-8"> <title>Unity Web Player | My project (1)</title> <link rel="shortcut icon" href="TemplateData/favicon.ico"> <link rel="stylesheet" href="TemplateData/style.css"> </head> <body> <div id="unity-container" class="unity-desktop"> <canvas id="unity-canvas" width=960 height=540 tabindex="-1"></canvas> <div id="unity-loading-bar"> <div id="unity-logo"></div> <div id="unity-progress-bar-empty"> <div id="unity-progress-bar-full"></div> </div> </div> <div id="unity-warning"> </div> <div id="unity-footer"> <div id="unity-logo-title-footer"></div> <div id="unity-fullscreen-button"></div> <div id="unity-build-title">My project (1)</div> </div> </div> <script>

  // ============================================================
  // BLOCK BROWSER KEYBOARD SHORTCUTS
  // Prevents shortcuts like Ctrl+Space, Ctrl+W, Ctrl+R, etc.
  // from being intercepted by the browser while the game is focused.
  // Add or remove key combos from the list below as needed.
  // ============================================================
  window.addEventListener('keydown', function(e) {
    var blockedCombos = [
      // Ctrl/Cmd + Space (browser spotlight / input suggestions)
      { ctrl: true, key: ' ' },
      // Ctrl + W (close tab) — uncomment if needed
      // { ctrl: true, key: 'w' },
      // Ctrl + R (reload) — uncomment if needed
      // { ctrl: true, key: 'r' },
      // Ctrl + S (save page) — uncomment if needed
      // { ctrl: true, key: 's' },
      // F5 (reload) — uncomment if needed
      // { key: 'F5' },
    ];

    for (var i = 0; i < blockedCombos.length; i++) {
      var combo = blockedCombos[i];
      var ctrlMatch = combo.ctrl ? (e.ctrlKey || e.metaKey) : true;
      var keyMatch = combo.key ? e.key === combo.key : true;
      if (ctrlMatch && keyMatch) {
        e.preventDefault();
        e.stopPropagation();
        return;
      }
    }
  }, true); // 'true' = capture phase, fires before browser handles it

  // ============================================================
  // DREAMLO LEADERBOARD CORS PROXY HELPER
  // GitHub Pages does NOT block outbound requests from Unity,
  // so Dreamlo should work as long as your Unity C# code calls
  // the correct Dreamlo URL. However, if you need to call Dreamlo
  // directly from JavaScript (e.g. to display scores on the page),
  // use this helper function:
  //
  //   fetchDreamloScores("YOUR_PUBLIC_CODE", function(data) {
  //     console.log(data); // JSON scores
  //   });
  //
  // Replace YOUR_PUBLIC_CODE with your Dreamlo public code.
  // This is optional — if Unity handles all Dreamlo calls, you
  // can delete this function entirely.
  // ============================================================
  function fetchDreamloScores(publicCode, callback) {
    var url = "https://dreamlo.com/lb/" + publicCode + "/json";
    fetch(url)
      .then(function(response) { return response.json(); })
      .then(function(data) { callback(data); })
      .catch(function(err) { console.error("Dreamlo fetch error:", err); });
  }

  var canvas = document.querySelector("#unity-canvas");

  function unityShowBanner(msg, type) {
    var warningBanner = document.querySelector("#unity-warning");
    function updateBannerVisibility() {
      warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
    }
    var div = document.createElement('div');
    div.innerHTML = msg;
    warningBanner.appendChild(div);
    if (type == 'error') div.style = 'background: red; padding: 10px;';
    else {
      if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
      setTimeout(function() {
        warningBanner.removeChild(div);
        updateBannerVisibility();
      }, 5000);
    }
    updateBannerVisibility();
  }

  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/Builds.loader.js";
  var config = {
    arguments: [],
    dataUrl: buildUrl + "/Builds.data.unityweb",
    frameworkUrl: buildUrl + "/Builds.framework.js.unityweb",
    codeUrl: buildUrl + "/Builds.wasm.unityweb",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "My project (1)",
    productVersion: "0.1",
    showBanner: unityShowBanner,
  };

  if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    var meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
    document.getElementsByTagName('head')[0].appendChild(meta);
    document.querySelector("#unity-container").className = "unity-mobile";
    canvas.className = "unity-mobile";
  } else {
    canvas.style.width = "960px";
    canvas.style.height = "540px";
  }

  document.querySelector("#unity-loading-bar").style.display = "block";

  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
    }).then((unityInstance) => {
      document.querySelector("#unity-loading-bar").style.display = "none";
      document.querySelector("#unity-fullscreen-button").onclick = () => {
        unityInstance.SetFullscreen(1);
      };
    }).catch((message) => {
      alert(message);
    });
  };

  document.body.appendChild(script);

</script>
</body> </html>
